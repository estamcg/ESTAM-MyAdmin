<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ESTAM MyAdmin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="Assets/img/Logo.png">
</head>
<body class="bg-[#1A2340] h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-[#E30613]">
        <div class="text-center mb-8">
            <img src="Assets/img/Logo-ESTAM.png" alt="Logo ESTAM" class="w-24 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-[#1A2340]">ESTAM <span class="text-[#E30613]">MyAdmin</span></h1>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Identifiant</label>
                <input type="text" id="username" name="username" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-[#E30613] outline-none border-gray-200" placeholder="admin" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="password" name="password" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-[#E30613] outline-none border-gray-200" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-[#E30613] text-white font-bold py-3 rounded-xl hover:bg-red-700 transition-all uppercase">
                Se Connecter
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    window.location.href = 'index.php';
                } else {
                    alert('Erreur : ' + data.message);
                }
            } catch (err) {
                alert('Impossible de joindre le serveur.');
            }
        });
    </script>
</body>
</html>
